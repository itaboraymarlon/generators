<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bumble chat generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: #e8e8e8;
    min-height: 100vh;
    display: flex;
    gap: 0;
  }

  /* ── LEFT PANEL ── */
  #editor-panel {
    width: 360px;
    min-width: 360px;
    background: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
    border-right: 1px solid #e0e0e0;
    overflow: hidden;
  }

  .panel-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid #f0f0f0;
    flex-shrink: 0;
  }
  .panel-header h2 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #999;
  }

  #messages-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── MESSAGE ROW ── */
  .msg-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: #fafafa;
    border: 1.5px solid #ececec;
    border-radius: 12px;
    padding: 10px 10px 10px 12px;
    transition: border-color 0.15s;
  }
  .msg-row:focus-within { border-color: #F5D76E; background: white; }

  .side-toggle {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-top: 2px;
    flex-shrink: 0;
  }
  .side-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid #ddd;
    cursor: pointer;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    transition: all 0.12s;
    color: #aaa;
  }
  .side-btn:hover { border-color: #bbb; color: #555; }
  .side-btn.active-left  { background: #DCDCDC; border-color: #bbb; color: #333; }
  .side-btn.active-right { background: #F5D76E; border-color: #d4b84a; color: #333; }

  .msg-row textarea {
    flex: 1;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.45;
    color: #111;
    resize: none;
    outline: none;
    min-height: 38px;
    overflow: hidden;
  }

  /* ── DATE ROW ── */
  .date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fafafa;
    border: 1.5px solid #ececec;
    border-radius: 12px;
    padding: 10px 10px 10px 12px;
    transition: border-color 0.15s;
  }
  .date-row:focus-within { border-color: #c0c0c0; background: white; }

  .date-icon {
    font-size: 13px;
    color: #bbb;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .date-row input[type="text"] {
    flex: 1;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    color: #888;
    outline: none;
    letter-spacing: 0.01em;
  }
  .date-row input[type="text"]::placeholder { color: #ccc; }

  /* shared delete + drag */
  .delete-btn {
    background: none; border: none;
    cursor: pointer; color: #ccc;
    padding: 2px 4px; border-radius: 6px;
    font-size: 16px; line-height: 1;
    transition: color 0.12s; flex-shrink: 0;
    margin-top: 1px;
  }
  .delete-btn:hover { color: #e05555; }

  .drag-handle {
    cursor: grab; color: #ccc;
    font-size: 13px; padding: 2px;
    flex-shrink: 0; margin-top: 2px;
    user-select: none;
  }
  .drag-handle:active { cursor: grabbing; }

  /* ── FOOTER ── */
  .panel-footer {
    padding: 12px;
    border-top: 1px solid #f0f0f0;
    display: flex; flex-direction: column; gap: 8px;
    flex-shrink: 0;
  }
  .add-btns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }
  .add-btn {
    padding: 9px 0;
    border-radius: 10px;
    border: 1.5px dashed #ddd;
    background: transparent;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    color: #888;
    transition: all 0.12s;
  }
  .add-btn:hover { border-color: #aaa; color: #333; background: #fafafa; }
  .add-btn.add-left  .dot { width: 9px; height: 9px; border-radius: 50%; background: #DCDCDC; border: 1.5px solid #bbb; }
  .add-btn.add-right .dot { width: 9px; height: 9px; border-radius: 50%; background: #F5D76E; border: 1.5px solid #d4b84a; }
  .add-btn.add-date  { color: #aaa; font-size: 14px; letter-spacing: 0.02em; }

  .save-btn {
    background: #111; color: white;
    border: none; border-radius: 10px;
    padding: 13px; font-size: 14px; font-weight: 600;
    cursor: pointer; width: 100%;
    transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: 0.01em;
  }
  .save-btn:hover { background: #333; }
  .save-btn:active { transform: scale(0.98); }

  /* ── RIGHT PANEL ── */
  #preview-wrap {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 32px;
    overflow-y: auto;
  }
  .preview-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: #aaa; margin-bottom: 20px;
    align-self: center;
  }
  #preview-container {
    background: white;
    border-radius: 24px;
    padding: 28px 24px;
    width: 380px;
    display: flex; flex-direction: column; gap: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  }

  /* bubbles */
  .bubble {
    font-size: 17px; line-height: 1.4;
    padding: 13px 17px;
    max-width: 80%;
    word-break: break-word; white-space: pre-wrap;
  }
  .bubble-left  { align-self: flex-start; background: #EFEFEF; color: #111; border-radius: 18px 18px 18px 4px; }
  .bubble-right { align-self: flex-end;   background: #F5D76E; color: #111; border-radius: 18px 18px 4px 18px; }

  /* date separator */
  .date-separator {
    align-self: center;
    font-size: 14px;
    color: #aaa;
    padding: 2px 0;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>

<div id="editor-panel">
  <div class="panel-header"><h2>Mensagens</h2></div>
  <div id="messages-list"></div>
  <div class="panel-footer">
    <div class="add-btns">
      <button class="add-btn add-left"  onclick="addMessage('left')"><span class="dot"></span> Recebida</button>
      <button class="add-btn add-right" onclick="addMessage('right')"><span class="dot"></span> Enviada</button>
      <button class="add-btn add-date"  onclick="addDate()">📅 Data</button>
    </div>
    <button class="save-btn" onclick="saveImage()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Salvar imagem
    </button>
  </div>
</div>

<div id="preview-wrap">
  <div class="preview-label">Preview</div>
  <div id="preview-container"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script>
  function uid() { return Math.random().toString(36).slice(2, 9); }

  let items = [
    { id: uid(), type: 'msg',  side: 'left',  text: 'oi' },
    { id: uid(), type: 'msg',  side: 'right', text: 'oi' },
  ];

  function render() { renderEditor(); renderPreview(); }

  function renderEditor() {
    const list = document.getElementById('messages-list');
    list.innerHTML = '';

    items.forEach((item) => {
      if (item.type === 'date') {
        const row = document.createElement('div');
        row.className = 'date-row';
        row.dataset.id = item.id;

        const handle = document.createElement('div');
        handle.className = 'drag-handle';
        handle.innerHTML = '⠿';
        row.appendChild(handle);

        const icon = document.createElement('div');
        icon.className = 'date-icon';
        icon.textContent = '📅';
        row.appendChild(icon);

        const inp = document.createElement('input');
        inp.type = 'text';
        inp.value = item.text;
        inp.placeholder = 'ex: 26 de mai. de 2026';
        inp.oninput = () => { item.text = inp.value; renderPreview(); };
        row.appendChild(inp);

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.innerHTML = '×';
        del.onclick = () => { items = items.filter(m => m.id !== item.id); render(); };
        row.appendChild(del);

        list.appendChild(row);

      } else {
        const row = document.createElement('div');
        row.className = 'msg-row';
        row.dataset.id = item.id;

        const handle = document.createElement('div');
        handle.className = 'drag-handle';
        handle.innerHTML = '⠿';
        row.appendChild(handle);

        const toggle = document.createElement('div');
        toggle.className = 'side-toggle';

        const btnL = document.createElement('button');
        btnL.className = 'side-btn ' + (item.side === 'left' ? 'active-left' : '');
        btnL.title = 'Recebida'; btnL.innerHTML = '←';
        btnL.onclick = () => { item.side = 'left'; render(); };

        const btnR = document.createElement('button');
        btnR.className = 'side-btn ' + (item.side === 'right' ? 'active-right' : '');
        btnR.title = 'Enviada'; btnR.innerHTML = '→';
        btnR.onclick = () => { item.side = 'right'; render(); };

        toggle.appendChild(btnL);
        toggle.appendChild(btnR);
        row.appendChild(toggle);

        const ta = document.createElement('textarea');
        ta.value = item.text;
        ta.rows = 1;
        ta.oninput = () => { item.text = ta.value; autoResize(ta); renderPreview(); };
        row.appendChild(ta);

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.innerHTML = '×';
        del.onclick = () => { items = items.filter(m => m.id !== item.id); render(); };
        row.appendChild(del);

        list.appendChild(row);
        setTimeout(() => autoResize(ta), 0);
      }
    });

    Sortable.create(list, {
      handle: '.drag-handle',
      animation: 150,
      onEnd(evt) {
        const moved = items.splice(evt.oldIndex, 1)[0];
        items.splice(evt.newIndex, 0, moved);
        renderPreview();
      }
    });
  }

  function renderPreview() {
    const container = document.getElementById('preview-container');
    container.innerHTML = '';
    items.forEach(item => {
      if (item.type === 'date') {
        const d = document.createElement('div');
        d.className = 'date-separator';
        d.textContent = item.text || '—';
        container.appendChild(d);
      } else {
        const b = document.createElement('div');
        b.className = 'bubble ' + (item.side === 'left' ? 'bubble-left' : 'bubble-right');
        b.textContent = item.text;
        container.appendChild(b);
      }
    });
  }

  function addMessage(side) {
    items.push({ id: uid(), type: 'msg', side, text: '' });
    render();
    setTimeout(() => {
      const tas = document.querySelectorAll('#messages-list textarea');
      if (tas.length) tas[tas.length - 1].focus();
      document.getElementById('messages-list').scrollTop = 99999;
    }, 50);
  }

  function addDate() {
    items.push({ id: uid(), type: 'date', text: '' });
    render();
    setTimeout(() => {
      const inps = document.querySelectorAll('#messages-list .date-row input');
      if (inps.length) inps[inps.length - 1].focus();
      document.getElementById('messages-list').scrollTop = 99999;
    }, 50);
  }

  function autoResize(ta) {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  }

  async function saveImage() {
    const btn = document.querySelector('.save-btn');
    const orig = btn.innerHTML;
    btn.textContent = 'Gerando…';
    btn.disabled = true;
    try {
      const target = document.getElementById('preview-container');
      const canvas = await html2canvas(target, {
        scale: 3, backgroundColor: null, useCORS: true, logging: false,
      });
      const link = document.createElement('a');
      link.download = 'dialogo.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } finally {
      btn.innerHTML = orig;
      btn.disabled = false;
    }
  }

  render();
</script>
</body>
</html>
